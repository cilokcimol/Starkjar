[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Public env vars (safe to commit)
[context.production.environment]
  NEXT_PUBLIC_TIPPING_CONTRACT_ADDRESS = "0x7a105e998b5e09b6a40b15a32bc1fc591f5748025d355e042259d659ab3c418"
  NEXT_PUBLIC_APP_URL = "https://starkjar.netlify.app"

[context.deploy-preview.environment]
  NEXT_PUBLIC_TIPPING_CONTRACT_ADDRESS = "0x7a105e998b5e09b6a40b15a32bc1fc591f5748025d355e042259d659ab3c418"

# Next.js plugin for SSR + API routes support
[[plugins]]
  package = "@netlify/plugin-nextjs"
